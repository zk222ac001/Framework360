services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "25173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: "http://localhost:23000"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "23000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: "file:/app/prisma/dev.db"
      JWT_SECRET: "dev-secret-change-me"
      CORS_ORIGIN: "http://localhost:25173"
    command: sh -c "npm run docker:dev"
    restart: unless-stopped
