services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: framework360
      POSTGRES_USER: framework360
      POSTGRES_PASSWORD: change-me-in-production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U framework360 -d framework360"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "23000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: "postgresql://framework360:change-me-in-production@postgres:5432/framework360?schema=public"
      CORS_ORIGIN: "https://your-production-domain.example"
      JWT_SECRET: "replace-with-a-long-random-secret"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run generate && npm run start"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "25173:5173"
    environment:
      VITE_API_BASE_URL: "https://your-api-domain.example"
    restart: unless-stopped

volumes:
  postgres_data:
