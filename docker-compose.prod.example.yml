services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: framework360
      POSTGRES_USER: framework360
      POSTGRES_PASSWORD: change-me-in-production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U framework360 -d framework360"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.prod.Dockerfile
    ports:
      - "23000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: "postgresql://framework360:change-me-in-production@postgres:5432/framework360?schema=public"
      CORS_ORIGIN: "https://your-production-domain.example"
      APP_BASE_URL: "https://your-production-domain.example"
      JWT_SECRET: "replace-with-a-long-random-secret"
      PLATFORM_ADMIN_EMAIL: "admin@example.com"
      PLATFORM_ADMIN_PASSWORD: "replace-with-a-strong-password"
      STRIPE_SECRET_KEY: "sk_live_or_test_key"
      STRIPE_WEBHOOK_SECRET: "whsec_your_webhook_signing_secret"
      STRIPE_STARTER_PRICE_ID: "price_1234567890starter"
      STRIPE_PROFESSIONAL_PRICE_ID: "price_1234567890professional"
      STRIPE_ENTERPRISE_PRICE_ID: "price_1234567890enterprise"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    command: sh -c "npx prisma migrate deploy && npm run seed:prod && node src/server.js"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.prod.Dockerfile
      args:
        VITE_API_BASE_URL: "https://your-api-domain.example"
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: "https://your-api-domain.example"
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
